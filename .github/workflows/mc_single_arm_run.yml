name: Run mc-single-arm Monte Carlo

on:
  workflow_dispatch:
    inputs:
      inp_file:
        description: >
          Name of the input file to use (stem only, without .inp extension).
          The file must exist in the infiles/ directory.
        required: true
        default: hms_40deg_carbon_1560

jobs:
  build-and-run:
    runs-on: ubuntu-latest
    container: eicweb/jug_xl:25.03.1-stable
    permissions:
      contents: read

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Compile mc_single_arm
        working-directory: src
        run: make

      - name: Compile ROOT tree converter
        working-directory: util/root_tree
        env:
          PATH: /opt/local/bin:${PATH}
        run: |
          export PATH="/opt/local/bin:${PATH}"
          make

      - name: Create worksim directory
        run: mkdir -p worksim

      - name: Run Monte Carlo simulation
        working-directory: src
        run: |
          ./mc_single_arm << 'EOF'
          ${{ github.event.inputs.inp_file }}
          EOF

      - name: Convert binary to ROOT
        working-directory: util/root_tree
        run: |
          ./make_root_tree << 'EOF'
          ${{ github.event.inputs.inp_file }}
          EOF

      - name: Upload output file
        uses: actions/upload-artifact@v4
        with:
          name: mc-output-${{ github.event.inputs.inp_file }}
          path: outfiles/${{ github.event.inputs.inp_file }}.out
          if-no-files-found: error

      - name: Upload ROOT file
        uses: actions/upload-artifact@v4
        with:
          name: mc-root-${{ github.event.inputs.inp_file }}
          path: worksim/${{ github.event.inputs.inp_file }}.root
          if-no-files-found: error

      - name: Upload binary file
        uses: actions/upload-artifact@v4
        with:
          name: mc-binary-${{ github.event.inputs.inp_file }}
          path: worksim/${{ github.event.inputs.inp_file }}.bin
          if-no-files-found: warn
